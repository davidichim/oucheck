<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Oucheck</title>
<style>
  :root {
  /* Fondo y superficies */
  --bg:        #FFF9F4;   /* crema cálido, no blanco frío */
  --card:      #FFFFFF;   /* tarjetas del veredicto */
  --border:    #F2E4D8;   /* bordes suaves */

  /* Texto */
  --text:      #2B2118;   /* marrón casi negro, más cálido que #000 */
  --muted:     #9A8778;   /* texto secundario */

  /* Acento principal (botones, puntuación) */
  --accent:      #FF6B4A;   /* coral vibrante */
  --accent-dark: #E8502F;   /* para hover/pressed */

  /* Bloques de veredicto */
  --ok:      #E9F7EF;   /* fondo "lo que funciona" */
  --ok-text: #1E8E5A;   /* verde cálido */
  --warn:      #FFF0E6;   /* fondo "lo que cambiaría" */
  --warn-text: #D9622B;   /* terracota, no rojo agresivo */
}
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    min-height: 100dvh; display: flex; justify-content: center;
    padding: 24px 18px calc(24px + env(safe-area-inset-bottom));
  }
  .app { width: 100%; max-width: 440px; }
  header { text-align: center; margin-bottom: 28px; }
  .logo {
    font-weight: 800; font-size: 30px; letter-spacing: -1px;
  }
  .logo span { color: var(--accent); }
  .tag { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .drop {
    border: 1.5px dashed var(--line); border-radius: 20px;
    aspect-ratio: 3/4; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; overflow: hidden; position: relative;
    background: var(--card); transition: border-color .2s;
  }
  .drop:active { border-color: var(--accent); }
  .drop img { width: 100%; height: 100%; object-fit: cover; }
  .drop .hint { color: var(--muted); font-size: 15px; text-align: center; padding: 0 20px; }
  .drop .plus { font-size: 34px; color: var(--accent); }

  input[type=file] { display: none; }

  .occ {
    width: 100%; margin-top: 14px; padding: 14px 16px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; color: var(--ink); font-size: 15px;
  }
  .occ::placeholder { color: var(--muted); }

  .go {
    width: 100%; margin-top: 14px; padding: 16px;
    background: var(--accent); color: #10130a; border: none;
    border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer;
  }
  .go:disabled { opacity: .4; cursor: default; }

  .result { margin-top: 22px; display: none; }
  .scorecard {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; padding: 20px;
  }
  .scoretop { display: flex; align-items: baseline; gap: 10px; }
  .score { font-size: 46px; font-weight: 800; line-height: 1; }
  .scoremax { color: var(--muted); font-size: 18px; }
  .desc { color: var(--muted); font-size: 14px; margin: 10px 0 4px; font-style: italic; }
  .verdict { font-size: 18px; font-weight: 700; margin-top: 12px; }

  .block { margin-top: 16px; }
  .block h4 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .block.f h4 { color: var(--ok); }
  .block.c h4 { color: var(--warn); }
  .block li { list-style: none; font-size: 15px; padding: 6px 0 6px 18px; position: relative; color: var(--ink); }
  .block li::before { content: "›"; position: absolute; left: 0; color: var(--muted); }

  .lightbox {
    position: fixed; inset: 0; background: #000; z-index: 99;
    display: none; align-items: center; justify-content: center;
  }
  .lightbox.on { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .lightbox .back {
    position: absolute; top: calc(14px + env(safe-area-inset-top)); left: 14px;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(0,0,0,.55); border: 1px solid var(--line);
    color: var(--ink); font-size: 22px; line-height: 1;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .again {
    width: 100%; margin-top: 12px; padding: 15px;
    background: transparent; color: var(--ink);
    border: 1px solid var(--line); border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .err { color: var(--warn); font-size: 14px; margin-top: 14px; display: none; }
  .spin { display: none; text-align: center; color: var(--muted); margin-top: 20px; font-size: 15px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Ou<span>check</span></div>
    <div class="tag">Tu segunda opinión antes de salir</div>
  </header>

  <label class="drop" id="drop">
    <div class="plus">+</div>
    <div class="hint">Haz o sube una foto de tu look</div>
    <input type="file" id="file" accept="image/*"/>
  </label>

  <input class="occ" id="occ" placeholder="¿A dónde vas? (opcional)" />
  <button class="go" id="go" disabled>Chequear look</button>

  <div class="spin" id="spin">Analizando tu look…</div>
  <div class="err" id="err"></div>

  <div class="result" id="result">
    <div class="scorecard">
      <div class="scoretop"><span class="score" id="score"></span><span class="scoremax">/10</span></div>
      <div class="desc" id="desc"></div>
      <div class="verdict" id="verdict"></div>
      <div class="block f"><h4>Funciona</h4><ul id="funciona"></ul></div>
      <div class="block c"><h4>Cambia esto</h4><ul id="cambiar"></ul></div>
    </div>
    <button class="again" id="again">Probar otro look</button>
  </div>
</div>
<div class="lightbox" id="lightbox">
  <button class="back" id="back">←</button>
  <img id="bigimg" alt="tu look ampliado" />
</div>
  
<script>
  const fileEl = document.getElementById("file");
  const drop = document.getElementById("drop");
  const go = document.getElementById("go");
  const spin = document.getElementById("spin");
  const err = document.getElementById("err");
  const result = document.getElementById("result");
  let imageData = null, mediaType = null;

  fileEl.addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 1200;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      const jpeg = c.toDataURL("image/jpeg", 0.8);
      imageData = jpeg.split(",")[1];
      mediaType = "image/jpeg";
      drop.innerHTML = `<img src="${jpeg}" alt="tu look" />`;
      go.disabled = false;
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(f);
});

  go.addEventListener("click", async () => {
    if (!imageData) return;
    err.style.display = "none";
    result.style.display = "none";
    spin.style.display = "block";
    go.disabled = true;

    try {
      const r = await fetch("/api/check", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          image: imageData,
          mediaType,
          occasion: document.getElementById("occ").value,
        }),
      });
      const raw = await r.text();
let data;
try { data = JSON.parse(raw); }
catch { throw new Error("El servidor no respondió bien (" + r.status + ")"); }
if (!r.ok) throw new Error(data.error || "Falló el análisis.");

      document.getElementById("score").textContent = data.score;
      document.getElementById("desc").textContent = data.descripcion || "";
      document.getElementById("verdict").textContent = data.veredicto || "";
      fill("funciona", data.funciona);
      fill("cambiar", data.cambiar);
      document.querySelector(".block.f").style.display = (data.funciona || []).length ? "block" : "none";
      document.querySelector(".block.c").style.display = (data.cambiar || []).length ? "block" : "none";
      result.style.display = "block";
    } catch (e) {
      err.textContent = e.message;
      err.style.display = "block";
    } finally {
      spin.style.display = "none";
      go.disabled = false;
    }
  });

  document.getElementById("again").addEventListener("click", () => {
    imageData = null; mediaType = null;
    fileEl.value = "";
    document.getElementById("occ").value = "";
    drop.innerHTML = '<div class="plus">+</div><div class="hint">Haz o sube una foto de tu look</div>';
    drop.appendChild(fileEl);
    result.style.display = "none";
    err.style.display = "none";
    go.disabled = true;
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  const lightbox = document.getElementById("lightbox");
  const bigimg = document.getElementById("bigimg");

  drop.addEventListener("click", (e) => {
    if (!imageData) return;
    e.preventDefault();
    bigimg.src = "data:" + mediaType + ";base64," + imageData;
    lightbox.classList.add("on");
  });

  document.getElementById("back").addEventListener("click", () => {
    lightbox.classList.remove("on");
  });
  function fill(id, arr) {
    const ul = document.getElementById(id);
    ul.innerHTML = "";
    (arr || []).forEach((t) => {
      const li = document.createElement("li");
      li.textContent = t;
      ul.appendChild(li);
    });
  }
</script>
</body>
</html>
